# --- Visuals ---
# This allows KDE to apply blur behind the window

# --- Fonts (The Tech Look) ---
font_family      MesloLGL Nerd Font Mono
bold_font        auto
font_size        11.0

# --- Cursor & Glow ---
cursor_shape          beam
cursor_beam_thickness 1.5
# Makes the cursor feel like a laser
cursor_blink_interval 0.5

# --- Window Layout ---
window_padding_width 10
# active_border_color #00ff41
# inactive_border_color #444444
draw_minimal_borders yes
window_border_width 1pt
# Adjusts how the font is hinted (none, slight, medium, full)
# 'slight' is often best for modern high-DPI screens
font_hinting slight

# Ensures subpixel anti-aliasing is enabled
font_smoothing true

# Prevents the font from snapping to pixels too aggressively
adjust_line_height 110%

confirm_os_window_close 0

clipboard_control write-clipboard write-primary read-clipboard read-primary

# BEGIN_KITTY_THEME
# Gruvbox Dark
include ~/.config/kitty/current-theme.conf
# END_KITTY_THEME
