# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha .3, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha .3, match:namespace swaync-notification-window


layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd
# 
# layerrule = blur on, match:class kitty
# windowrule = opacity 0.9 0.8, match:class kitty
# 
# layerrule = blur on, match:class ^(.*dolphin)
# windowrule = opacity 0.9 0.8, match:class ^(.*dolphin)

windowrule{
    name = spotify-special
    match:class = ^(spotify)
    workspace = special:magic
}

windowrule{
    name = extension-float
    match:class = zen
    match:title = ^(Extension:)(.*)$
    float = on
    center = on
}
