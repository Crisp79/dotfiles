# --- Core environment ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland

# --- Core UI / Hyprland ecosystem ---
exec-once = waybar
exec-once = hyprpaper
exec-once = hyprpm reload
exec-once = swaync
exec-once = hypridle

# --- KDE integration (lightweight, useful) ---
exec-once = kwalletd6
exec-once = kded6
exec-once = kdeconnectd

# --- NetworkManager secret agent (replaces nm-applet) ---
exec-once = sleep 2 && nmcli agent secret

# --- Polkit (for auth dialogs like wifi, mounts, etc.) ---
exec-once = /usr/lib/polkit-kde/polkit-kde-authentication-agent-1
