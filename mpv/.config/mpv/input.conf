a set sub-delay 0

= add volume 5
- add volume -5

1 add chapter -1
2 add chapter 1

! add contrast -1
@ add contrast 1

3 add audio 1
4 cycle sub

# add brightness -1
$ add brightness 1

5 seek -90
6 seek 90

% add gamma -1
^ add gamma 1

